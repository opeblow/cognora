version: "3.9"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      POSTGRES_DB: ${POSTGRES_DB:-cognora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognora} -d ${POSTGRES_DB:-cognora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 300 1 --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2.5G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OpenAI API key is required}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-Cognora <noreply@cognora.app>}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      APP_URL: ${APP_URL:-https://cognora.app}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://api.cognora.app/api/auth/google/callback}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      AGORA_APP_ID: ${AGORA_APP_ID}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE}
      LIVE_SESSION_PROVIDER: ${LIVE_SESSION_PROVIDER:-mock}
      SENTRY_DSN: ${SENTRY_DSN}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 65 --no-reload
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OpenAI API key is required}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      SENTRY_DSN: ${SENTRY_DSN}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.cognora.app}
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.cognora.app}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.cognora.app}
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
