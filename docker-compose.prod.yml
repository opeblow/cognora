version: "3.9"

volumes:
  postgres_data:
  postgres_replica_data:
  redis_cache_data:
  redis_broker_data:
  certbot_www:
  certbot_conf:
  prometheus_data:
  grafana_data:

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - cognora-net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      POSTGRES_DB: ${POSTGRES_DB:-cognora}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=1GB
        -c effective_cache_size=3GB
        -c work_mem=32MB
        -c maintenance_work_mem=256MB
        -c max_connections=300
        -c wal_buffers=32MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=500
        -c max_wal_senders=10
        -c wal_level=replica
        -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognora} -d ${POSTGRES_DB:-cognora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    networks:
      - cognora-net

  db-replica:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cognora}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    command: >
      bash -c "
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          pg_basebackup -h db -p 5432 -U ${POSTGRES_USER:-cognora} -D /var/lib/postgresql/data -Fp -Xs -P -R
          echo 'primary_conninfo = host=db port=5432 user=${POSTGRES_USER:-cognora} password=${POSTGRES_PASSWORD}' > /var/lib/postgresql/data/postgresql.auto.conf
          touch /var/lib/postgresql/data/standby.signal
        fi
        exec postgres -c hot_standby=on -c max_connections=200 -c shared_buffers=512MB
      "
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - cognora-net

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    expose:
      - "6432"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cognora}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 1000
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 3
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      CLIENT_IDLE_TIMEOUT: 0
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - cognora-net

  pgbouncer-replica:
    image: edoburu/pgbouncer:1.23.1-p2
    expose:
      - "6432"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db-replica:5432/${POSTGRES_DB:-cognora}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 30
      MAX_CLIENT_CONN: 1500
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 3
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    depends_on:
      db-replica:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - cognora-net

  redis-cache:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_cache_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --save 60 1000 --maxclients 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    networks:
      - cognora-net

  redis-broker:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_broker_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction --save 300 1 --maxclients 5000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    networks:
      - cognora-net

  backend-1: &backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cognora}
      DATABASE_READ_REPLICA_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@pgbouncer-replica:6432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis-cache:6379/0
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      REDIS_BROKER_URL: redis://redis-broker:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis-broker:6379/1
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OpenAI API key is required}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-Cognora <noreply@cognora.app>}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      APP_URL: ${APP_URL:-https://cognora.app}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://api.cognora.app/api/auth/google/callback}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      AGORA_APP_ID: ${AGORA_APP_ID}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE}
      LIVE_SESSION_PROVIDER: ${LIVE_SESSION_PROVIDER:-mock}
      SENTRY_DSN: ${SENTRY_DSN}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DEBUG: "false"
    depends_on:
      pgbouncer:
        condition: service_started
      pgbouncer-replica:
        condition: service_started
      redis-cache:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 65 --no-reload
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    networks:
      - cognora-net

  backend-2:
    <<: *backend-common
    container_name: cognora-backend-2

  backend-3:
    <<: *backend-common
    container_name: cognora-backend-3

  backend-4:
    <<: *backend-common
    container_name: cognora-backend-4

  celery-worker-1: &celery-common
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis-cache:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis-broker:6379/1
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OpenAI API key is required}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      SENTRY_DSN: ${SENTRY_DSN}
      DEBUG: "false"
    depends_on:
      pgbouncer:
        condition: service_started
      redis-cache:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100 -Q default,cpu
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - cognora-net

  celery-worker-2:
    <<: *celery-common
    container_name: cognora-celery-worker-2
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=50 -Q io,ai

  celery-worker-3:
    <<: *celery-common
    container_name: cognora-celery-worker-3
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=50 -Q io,ai

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cognora}
      REDIS_URL: redis://redis-cache:6379/0
      CELERY_BROKER_URL: redis://redis-broker:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis-broker:6379/1
      SECRET_KEY: ${SECRET_KEY:?JWT secret key is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://cognora.app"]}
      DEBUG: "false"
    depends_on:
      pgbouncer:
        condition: service_started
      redis-broker:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - cognora-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.cognora.app}
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.cognora.app}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.cognora.app}
    depends_on:
      - backend-1
      - backend-2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - cognora-net

  prometheus:
    image: prom/prometheus:v2.53.0
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - cognora-net

  grafana:
    image: grafana/grafana:11.1.0
    expose:
      - "3001"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-cognora-grafana-2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://monitoring.cognora.app"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - cognora-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    expose:
      - "9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-cognora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cognora}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - cognora-net

  redis-cache-exporter:
    image: oliver006/redis_exporter:v1.61.0
    expose:
      - "9121"
    environment:
      REDIS_ADDR: "redis://redis-cache:6379"
    depends_on:
      redis-cache:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - cognora-net

  redis-broker-exporter:
    image: oliver006/redis_exporter:v1.61.0
    expose:
      - "9121"
    environment:
      REDIS_ADDR: "redis://redis-broker:6379"
    depends_on:
      redis-broker:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - cognora-net

networks:
  cognora-net:
    driver: bridge
